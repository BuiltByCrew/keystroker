<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keystroke Racer — Typing Speed Benchmark &amp; Heatmap</title>
  <meta name="description" content="Benchmark your WPM and accuracy across custom or preset texts, then see a live keyboard heatmap showing your slowest keys — so you know exactly where to practice.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://keystroker.builtbycrew.online/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Keystroke Racer — Typing Speed Benchmark &amp; Heatmap">
  <meta property="og:description" content="Benchmark your WPM and accuracy across custom or preset texts, then see a live keyboard heatmap showing your slowest keys — so you know exactly where to practice.">
  <meta property="og:url" content="https://keystroker.builtbycrew.online/">
  <meta property="og:site_name" content="BuiltByCrew">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Keystroke Racer — Typing Speed Benchmark &amp; Heatmap">
  <meta name="twitter:description" content="Benchmark your WPM and accuracy across custom or preset texts, then see a live keyboard heatmap showing your slowest keys — so you know exactly where to practice.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%231a1a1a'/%3E%3Crect x='4' y='10' width='6' height='6' rx='1' fill='%23f0ece0'/%3E%3Crect x='12' y='10' width='6' height='6' rx='1' fill='%23f0ece0'/%3E%3Crect x='20' y='10' width='8' height='6' rx='1' fill='%23f0ece0'/%3E%3Crect x='4' y='18' width='24' height='6' rx='1' fill='%23f0ece0'/%3E%3C/svg%3E">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Press+Start+2P&display=swap');

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --ink: #f0ece0;
      --ink-dim: #888;
      --ink-muted: #555;
      --accent: #f0ece0;
      --key-base: #2a2a2a;
      --key-border: #444;
      --key-top: #1f1f1f;
      --cold: #1a3a4a;
      --warm: #4a2a1a;
      --hot: #8a1a0a;
      --pixel: 2px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      overflow-x: hidden;
    }

    body {
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.012) 3px, rgba(255,255,255,0.012) 4px),
        repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(255,255,255,0.006) 3px, rgba(255,255,255,0.006) 4px);
      min-height: 100vh;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.15) 0px,
        rgba(0,0,0,0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ─── LAYOUT ─── */
    #app {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* ─── HEADER ─── */
    header {
      text-align: center;
      padding: 2rem 0 1rem;
      animation: fadeSlideDown 0.6s ease both;
    }

    .logo-title {
      font-family: 'VT323', monospace;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      letter-spacing: 0.05em;
      color: var(--ink);
      line-height: 1;
      text-shadow: 0 0 30px rgba(240,236,224,0.15);
      position: relative;
      display: inline-block;
    }

    .logo-title::after {
      content: '▮';
      display: inline-block;
      animation: blink 1s step-end infinite;
      margin-left: 4px;
      font-size: 0.7em;
      opacity: 0.7;
    }

    .logo-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--ink-dim);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    /* ─── PRESET SELECTOR ─── */
    .preset-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeSlideDown 0.6s 0.1s ease both;
    }

    .preset-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.75rem 0.9rem;
      min-height: 44px;
      background: var(--surface);
      color: var(--ink-dim);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      outline: none;
      clip-path: polygon(0 2px, 2px 0, calc(100% - 2px) 0, 100% 2px, 100% calc(100% - 2px), calc(100% - 2px) 100%, 2px 100%, 0 calc(100% - 2px));
    }

    .preset-btn:hover {
      color: var(--ink);
      border-color: var(--ink-dim);
      background: var(--surface2);
    }

    .preset-btn.active {
      color: var(--bg);
      background: var(--ink);
      border-color: var(--ink);
    }

    .preset-btn:active { transform: scale(0.96); }

    /* ─── CUSTOM TEXT AREA ─── */
    .custom-input-wrap {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .custom-input-wrap.visible { display: block; }

    textarea#customText {
      width: 100%;
      min-height: 80px;
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--border);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      padding: 0.75rem 1rem;
      resize: vertical;
      outline: none;
      line-height: 1.6;
      clip-path: polygon(0 3px, 3px 0, calc(100% - 3px) 0, 100% 3px, 100% calc(100% - 3px), calc(100% - 3px) 100%, 3px 100%, 0 calc(100% - 3px));
    }
    textarea#customText:focus { border-color: var(--ink-dim); }

    .use-custom-btn {
      margin-top: 0.5rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.75rem 1rem;
      min-height: 44px;
      background: var(--surface2);
      color: var(--ink);
      border: 1px solid var(--border);
      cursor: pointer;
      clip-path: polygon(0 2px, 2px 0, calc(100% - 2px) 0, 100% 2px, 100% calc(100% - 2px), calc(100% - 2px) 100%, 2px 100%, 0 calc(100% - 2px));
      transition: all 0.15s;
    }
    .use-custom-btn:hover { border-color: var(--ink); background: var(--surface); }
    .use-custom-btn:active { transform: scale(0.96); }

    /* ─── PASSAGE DISPLAY ─── */
    .passage-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.5rem;
      position: relative;
      animation: fadeSlideDown 0.6s 0.2s ease both;
      clip-path: polygon(0 4px, 4px 0, calc(100% - 4px) 0, 100% 4px, 100% calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 0 calc(100% - 4px));
    }

    .passage-wrap::before {
      content: 'PASSAGE';
      position: absolute;
      top: -10px;
      left: 16px;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--ink-muted);
      background: var(--surface);
      padding: 0 6px;
    }

    #passageDisplay {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.05rem;
      line-height: 1.85;
      word-break: break-word;
      white-space: pre-wrap;
      letter-spacing: 0.03em;
    }

    .char { display: inline; }
    .char.correct { color: var(--ink-dim); }
    .char.incorrect {
      color: #ff4444;
      background: rgba(255,60,60,0.15);
      border-radius: 2px;
    }
    .char.current {
      color: var(--ink);
      border-bottom: 2px solid var(--ink);
      animation: cursorPulse 0.7s ease-in-out infinite;
    }
    .char.pending { color: var(--ink-muted); }

    /* ─── TYPING INPUT ─── */
    .typing-area {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      animation: fadeSlideDown 0.6s 0.3s ease both;
    }

    #typingInput {
      width: 100%;
      min-height: 44px;
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--border);
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      padding: 0.8rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      clip-path: polygon(0 3px, 3px 0, calc(100% - 3px) 0, 100% 3px, 100% calc(100% - 3px), calc(100% - 3px) 100%, 3px 100%, 0 calc(100% - 3px));
      caret-color: var(--ink);
    }

    #typingInput:focus { border-color: var(--ink-dim); }
    #typingInput:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── STATS BAR ─── */
    .stats-bar {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeSlideDown 0.6s 0.35s ease both;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.75rem 1.25rem;
      text-align: center;
      flex: 1;
      min-width: 90px;
      clip-path: polygon(0 3px, 3px 0, calc(100% - 3px) 0, 100% 3px, 100% calc(100% - 3px), calc(100% - 3px) 100%, 3px 100%, 0 calc(100% - 3px));
      transition: border-color 0.3s;
    }

    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 0.25rem;
    }

    .stat-value {
      font-family: 'VT323', monospace;
      font-size: 2rem;
      line-height: 1;
      color: var(--ink);
      transition: all 0.2s;
    }

    .stat-unit {
      font-size: 0.7rem;
      color: var(--ink-muted);
      letter-spacing: 0.15em;
    }

    /* ─── PROGRESS ─── */
    .progress-wrap {
      position: relative;
      height: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--ink);
      width: 0%;
      transition: width 0.1s linear;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      width: 8px;
      height: 100%;
      background: rgba(240,236,224,0.6);
      animation: progressGlow 0.8s ease-in-out infinite;
    }

    /* ─── RESET BUTTON ─── */
    .controls {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      animation: fadeSlideDown 0.6s 0.4s ease both;
    }

    .reset-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.75rem 1.5rem;
      min-height: 44px;
      background: var(--surface);
      color: var(--ink-dim);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
      clip-path: polygon(0 3px, 3px 0, calc(100% - 3px) 0, 100% 3px, 100% calc(100% - 3px), calc(100% - 3px) 100%, 3px 100%, 0 calc(100% - 3px));
    }

    .reset-btn:hover { color: var(--ink); border-color: var(--ink-dim); background: var(--surface2); }
    .reset-btn:active { transform: scale(0.96); }

    /* ─── RESULT PANEL ─── */
    .result-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.5rem;
      text-align: center;
      position: relative;
      clip-path: polygon(0 4px, 4px 0, calc(100% - 4px) 0, 100% 4px, 100% calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 0 calc(100% - 4px));
      animation: resultReveal 0.5s cubic-bezier(0.23, 1, 0.32, 1) both;
    }

    .result-panel.visible { display: block; }

    .result-panel::before {
      content: 'RESULT';
      position: absolute;
      top: -10px;
      left: 16px;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--ink-muted);
      background: var(--surface);
      padding: 0 6px;
    }

    .result-wpm {
      font-family: 'VT323', monospace;
      font-size: clamp(3.5rem, 8vw, 6rem);
      line-height: 1;
      color: var(--ink);
      text-shadow: 0 0 40px rgba(240,236,224,0.3);
      animation: countUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) both;
    }

    .result-label {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--ink-muted);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .result-grid {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .result-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
    }

    .result-item-val {
      font-family: 'VT323', monospace;
      font-size: 1.6rem;
      color: var(--ink);
      line-height: 1;
    }

    .result-item-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      color: var(--ink-muted);
      text-transform: uppercase;
    }

    /* ─── HEATMAP SECTION ─── */
    .heatmap-section {
      animation: fadeSlideDown 0.6s 0.45s ease both;
    }

    .section-title {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── KEYBOARD ─── */
    .keyboard {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.25rem 1rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      clip-path: polygon(0 4px, 4px 0, calc(100% - 4px) 0, 100% 4px, 100% calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 0 calc(100% - 4px));
      overflow-x: auto;
    }

    .kb-row {
      display: flex;
      gap: 4px;
    }

    .key {
      --heat: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      width: 38px;
      height: 38px;
      background: var(--key-base);
      color: var(--ink-dim);
      border: 1px solid var(--key-border);
      border-bottom: 3px solid #111;
      cursor: default;
      transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      flex-shrink: 0;
      /* pixel-grid aesthetic */
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), inset 0 -1px 0 rgba(0,0,0,0.4);
    }

    .key.wide-1-5 { width: 57px; }
    .key.wide-2   { width: 78px; }
    .key.wide-2-3 { width: 91px; }
    .key.wide-3   { width: 120px; }
    .key.spacebar { width: 260px; }

    /* heat coloring via CSS custom property driven by JS */
    .key.has-data {
      background: color-mix(in oklch, #0f0f0f, rgb(var(--heat-r, 42), var(--heat-g, 42), var(--heat-b, 42)) calc(var(--heat) * 100%));
      border-color: color-mix(in oklch, var(--key-border), rgb(var(--heat-r, 68), var(--heat-g, 68), var(--heat-b, 68)) calc(var(--heat) * 100%));
    }

    .key .heat-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: transparent;
      transition: background 0.4s ease, height 0.4s ease;
    }

    .key .key-label {
      position: relative;
      z-index: 1;
      line-height: 1;
      pointer-events: none;
    }

    .key .key-time {
      position: absolute;
      top: 2px;
      right: 3px;
      font-size: 0.7rem;
      color: var(--ink-muted);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .key:hover .key-time { opacity: 1; }

    .key.pressed-anim {
      transform: translateY(2px);
      border-bottom-width: 1px;
    }

    /* ─── HEATMAP LEGEND ─── */
    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.75rem;
      font-size: 0.7rem;
      color: var(--ink-muted);
      letter-spacing: 0.12em;
    }

    .legend-grad {
      flex: 1;
      max-width: 140px;
      height: 6px;
      background: linear-gradient(to right, #1a3a4a, #2a5a2a, #8a6a0a, #8a1a0a);
      border: 1px solid var(--border);
    }

    /* ─── ANIMATIONS ─── */
    @keyframes blink { 50% { opacity: 0; } }

    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes cursorPulse {
      0%, 100% { border-bottom-color: var(--ink); }
      50% { border-bottom-color: transparent; }
    }

    @keyframes progressGlow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes resultReveal {
      from { opacity: 0; transform: scale(0.97) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes countUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes completionBurst {
      0%   { opacity: 1; transform: scale(1); }
      50%  { opacity: 0.6; transform: scale(1.04); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ─── FOOTER ─── */
    footer {
      text-align: center;
      font-size: 0.7rem;
      color: var(--ink-muted);
      letter-spacing: 0.1em;
      padding: 1rem 0;
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }

    footer a {
      color: var(--ink-dim);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--ink); }

    /* ─── PARTICLE CANVAS ─── */
    #burstCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }

    /* ─── BEST SCORES ─── */
    .best-wrap {
      font-size: 0.7rem;
      color: var(--ink-muted);
      text-align: center;
      letter-spacing: 0.1em;
    }

    .best-wrap span { color: var(--ink-dim); }
  </style>
</head>
<body>

<canvas id="burstCanvas"></canvas>

<div id="app">
  <header>
    <div class="logo-title">KEYSTROKE RACER</div>
    <div class="logo-sub">Typing Speed Benchmark &amp; Heatmap</div>
  </header>

  <!-- Preset selector -->
  <div class="preset-bar" id="presetBar" role="group" aria-label="Text presets">
    <button class="preset-btn active" data-preset="0" aria-pressed="true">Classic</button>
    <button class="preset-btn" data-preset="1" aria-pressed="false">Dev</button>
    <button class="preset-btn" data-preset="2" aria-pressed="false">Zen</button>
    <button class="preset-btn" data-preset="3" aria-pressed="false">Numbers</button>
    <button class="preset-btn" data-preset="custom" aria-pressed="false">Custom</button>
  </div>

  <div class="custom-input-wrap" id="customWrap">
    <textarea id="customText" placeholder="Type or paste your own passage here…" aria-label="Custom passage text" maxlength="1000"></textarea>
    <button class="use-custom-btn" id="useCustomBtn">Use this text ↵</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar" aria-live="polite" aria-label="Live stats">
    <div class="stat-box">
      <div class="stat-label">WPM</div>
      <div class="stat-value" id="statWpm">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Accuracy</div>
      <div class="stat-value" id="statAcc">—</div>
      <div class="stat-unit">%</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="statTime">0.0</div>
      <div class="stat-unit">sec</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Progress</div>
      <div class="stat-value" id="statProg">0</div>
      <div class="stat-unit">%</div>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="progress-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Passage display -->
  <div class="passage-wrap">
    <div id="passageDisplay" aria-label="Passage to type" role="region"></div>
  </div>

  <!-- Typing input -->
  <div class="typing-area">
    <input
      type="text"
      id="typingInput"
      placeholder="Start typing to begin…"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      aria-label="Typing input — type the passage above"
    >
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="reset-btn" id="resetBtn" aria-label="Reset race">↺ Reset</button>
  </div>

  <!-- Result panel -->
  <div class="result-panel" id="resultPanel" role="region" aria-label="Race results">
    <div class="result-wpm" id="resultWpm">0</div>
    <div class="result-label">Words Per Minute</div>
    <div class="result-grid">
      <div class="result-item">
        <div class="result-item-val" id="resultAcc">—</div>
        <div class="result-item-label">Accuracy %</div>
      </div>
      <div class="result-item">
        <div class="result-item-val" id="resultTime">—</div>
        <div class="result-item-label">Total Time (s)</div>
      </div>
      <div class="result-item">
        <div class="result-item-val" id="resultErrors">0</div>
        <div class="result-item-label">Errors</div>
      </div>
      <div class="result-item">
        <div class="result-item-val" id="resultChars">0</div>
        <div class="result-item-label">Chars Typed</div>
      </div>
    </div>
    <div class="best-wrap" id="bestWrap"></div>
  </div>

  <!-- Heatmap -->
  <div class="heatmap-section">
    <div class="section-title">Key Heatmap</div>
    <div class="keyboard" id="keyboard" aria-label="Keyboard heatmap" role="img"></div>
    <div class="heatmap-legend">
      <span>Fast</span>
      <div class="legend-grad"></div>
      <span>Slow</span>
    </div>
  </div>
</div>

<footer>
  <span>Built by <a href="https://builtbycrew.online/" target="_blank" rel="noopener">BuiltByCrew</a> — a new app every day</span>
  &nbsp;·&nbsp;

<script>
(() => {
  'use strict';

  // ─── PRESETS ───────────────────────────────────────────────────────────────
  const PRESETS = [
    `The quick brown fox jumps over the lazy dog near the riverbank. A thick fog rolled in from the west, blanketing the valley in silence. Every morning the old clockmaker wound each spring with care.`,
    `function debounce(fn, delay) { let timer; return function(...args) { clearTimeout(timer); timer = setTimeout(() => fn.apply(this, args), delay); }; }`,
    `Breathe in slowly. The mind is a river — let thoughts drift past like leaves. Stillness is not the absence of motion but the presence of calm acceptance.`,
    `The year 2024 saw 3.8 billion users generate 4.5 exabytes daily. By 2030 forecasts predict 15.7 trillion connected devices across 192 nations.`
  ];

  // ─── KEYBOARD LAYOUT ──────────────────────────────────────────────────────
  const KB_ROWS = [
    [
      {k:'`',w:1},{k:'1',w:1},{k:'2',w:1},{k:'3',w:1},{k:'4',w:1},{k:'5',w:1},
      {k:'6',w:1},{k:'7',w:1},{k:'8',w:1},{k:'9',w:1},{k:'0',w:1},{k:'-',w:1},
      {k:'=',w:1},{k:'⌫',w:'wide-2',id:'backspace'}
    ],
    [
      {k:'TAB',w:'wide-1-5'},{k:'q',w:1},{k:'w',w:1},{k:'e',w:1},{k:'r',w:1},
      {k:'t',w:1},{k:'y',w:1},{k:'u',w:1},{k:'i',w:1},{k:'o',w:1},{k:'p',w:1},
      {k:'[',w:1},{k:']',w:1},{k:'\\',w:'wide-1-5'}
    ],
    [
      {k:'CAPS',w:'wide-2'},{k:'a',w:1},{k:'s',w:1},{k:'d',w:1},{k:'f',w:1},
      {k:'g',w:1},{k:'h',w:1},{k:'j',w:1},{k:'k',w:1},{k:'l',w:1},
      {k:';',w:1},{k:"'",w:1},{k:'↵',w:'wide-2-3',id:'enter'}
    ],
    [
      {k:'⇧',w:'wide-3',id:'lshift'},{k:'z',w:1},{k:'x',w:1},{k:'c',w:1},
      {k:'v',w:1},{k:'b',w:1},{k:'n',w:1},{k:'m',w:1},{k:',',w:1},
      {k:'.',w:1},{k:'/',w:1},{k:'⇧',w:'wide-2-3',id:'rshift'}
    ],
    [
      {k:'CTRL',w:'wide-1-5'},{k:'ALT',w:'wide-1-5'},{k:' ',w:'spacebar',id:'space',label:'SPACE'},{k:'ALT',w:'wide-1-5'},{k:'CTRL',w:'wide-1-5'}
    ]
  ];

  // key id → DOM element map
  const keyElMap = {};
  // per-key timing data: { totalMs, count, lastTime }
  const keyData = {};

  // ─── STATE ─────────────────────────────────────────────────────────────────
  let passage = PRESETS[0];
  let currentIdx = 0;
  let startTime = null;
  let timerRaf = null;
  let lastKeyTime = null;
  let totalTyped = 0;
  let totalErrors = 0;
  let isFinished = false;
  let activePreset = 0;
  let displayedWpm = 0;
  let displayedAcc = 0;

  const LS_KEY = 'appfactory_keystroker_best';

  // ─── DOM REFS ──────────────────────────────────────────────────────────────
  const passageDisplay = document.getElementById('passageDisplay');
  const typingInput    = document.getElementById('typingInput');
  const statWpm        = document.getElementById('statWpm');
  const statAcc        = document.getElementById('statAcc');
  const statTime       = document.getElementById('statTime');
  const statProg       = document.getElementById('statProg');
  const progressFill   = document.getElementById('progressFill');
  const progressBar    = document.getElementById('progressBar');
  const resultPanel    = document.getElementById('resultPanel');
  const resultWpm      = document.getElementById('resultWpm');
  const resultAcc      = document.getElementById('resultAcc');
  const resultTime     = document.getElementById('resultTime');
  const resultErrors   = document.getElementById('resultErrors');
  const resultChars    = document.getElementById('resultChars');
  const bestWrap       = document.getElementById('bestWrap');
  const resetBtn       = document.getElementById('resetBtn');
  const presetBar      = document.getElementById('presetBar');
  const customWrap     = document.getElementById('customWrap');
  const customText     = document.getElementById('customText');
  const useCustomBtn   = document.getElementById('useCustomBtn');
  const burstCanvas    = document.getElementById('burstCanvas');
  const bctx           = burstCanvas.getContext('2d');

  // ─── BUILD KEYBOARD ────────────────────────────────────────────────────────
  (() => {
    const kbd = document.getElementById('keyboard');
    KB_ROWS.forEach(row => {
      const rowEl = document.createElement('div');
      rowEl.className = 'kb-row';
      row.forEach(keyDef => {
        const el = document.createElement('div');
        el.className = 'key';
        if (keyDef.w !== 1) el.classList.add(keyDef.w);
        const lbl = document.createElement('span');
        lbl.className = 'key-label';
        lbl.textContent = keyDef.label || keyDef.k;
        el.appendChild(lbl);
        const timeEl = document.createElement('span');
        timeEl.className = 'key-time';
        el.appendChild(timeEl);
        const heatBar = document.createElement('div');
        heatBar.className = 'heat-bar';
        el.appendChild(heatBar);
        el.setAttribute('aria-label', `Key: ${keyDef.label || keyDef.k}`);

        // Map key character to element
        const id = keyDef.id || keyDef.k.toLowerCase();
        keyElMap[id] = el;
        rowEl.appendChild(el);
      });
      kbd.appendChild(rowEl);
    });
  })();

  // ─── BUILD PASSAGE DISPLAY ─────────────────────────────────────────────────
  function buildPassage(text) {
    passageDisplay.innerHTML = '';
    [...text].forEach((ch, i) => {
      const span = document.createElement('span');
      span.className = 'char pending';
      span.dataset.idx = i;
      span.textContent = ch === ' ' ? '\u00A0' : ch;
      passageDisplay.appendChild(span);
    });
    // highlight first char
    const first = passageDisplay.querySelector('[data-idx="0"]');
    if (first) {
      first.classList.remove('pending');
      first.classList.add('current');
    }
  }

  function initRace(text) {
    passage = text.trim() || PRESETS[0];
    currentIdx = 0;
    startTime = null;
    lastKeyTime = null;
    totalTyped = 0;
    totalErrors = 0;
    isFinished = false;
    displayedWpm = 0;
    displayedAcc = 0;
    if (timerRaf) cancelAnimationFrame(timerRaf);
    timerRaf = null;

    buildPassage(passage);
    typingInput.value = '';
    typingInput.disabled = false;
    typingInput.placeholder = 'Start typing to begin…';

    statWpm.textContent = '0';
    statAcc.textContent = '—';
    statTime.textContent = '0.0';
    statProg.textContent = '0';
    progressFill.style.width = '0%';
    progressBar.setAttribute('aria-valuenow', '0');

    resultPanel.classList.remove('visible');

    Object.values(keyData).forEach(d => { d.totalMs = 0; d.count = 0; d.lastTime = null; });
    updateKeyHeatmap();
  }

  // ─── TIMER LOOP ─────────────────────────────────────────────────────────────
  function startTimer() {
    function loop() {
      if (isFinished || !startTime) return;
      const elapsed = (performance.now() - startTime) / 1000;
      statTime.textContent = elapsed.toFixed(1);

      // Live WPM
      const wordsTyped = currentIdx / 5;
      const wpm = elapsed > 0 ? Math.round((wordsTyped / elapsed) * 60) : 0;
      if (wpm !== displayedWpm) {
        displayedWpm = wpm;
        statWpm.textContent = wpm;
      }
      timerRaf = requestAnimationFrame(loop);
    }
    timerRaf = requestAnimationFrame(loop);
  }

  // ─── INPUT HANDLER ─────────────────────────────────────────────────────────
  typingInput.addEventListener('keydown', (e) => {
    if (isFinished) return;
    if (e.key === 'Backspace') {
      e.preventDefault();
      if (currentIdx <= 0) return;
      // revert last char
      currentIdx--;
      const charEls = passageDisplay.querySelectorAll('.char');
      charEls[currentIdx].classList.remove('correct', 'incorrect', 'current');
      charEls[currentIdx].classList.add('current');
      if (currentIdx + 1 < charEls.length) {
        charEls[currentIdx + 1].classList.remove('current', 'correct', 'incorrect');
        charEls[currentIdx + 1].classList.add('pending');
      }
      // Update progress
      const pct = Math.round((currentIdx / passage.length) * 100);
      statProg.textContent = pct;
      progressFill.style.width = pct + '%';
      progressBar.setAttribute('aria-valuenow', pct);
      typingInput.value = '';
    }
  });

  typingInput.addEventListener('input', (e) => {
    if (isFinished) return;
    const val = typingInput.value;
    if (!val.length) return;
    const typedChar = val[val.length - 1];
    typingInput.value = '';

    // Start timer on first key
    if (startTime === null) {
      startTime = performance.now();
      lastKeyTime = startTime;
      startTimer();
    }

    // Record timing for this key
    const now = performance.now();
    const gap = lastKeyTime !== null ? now - lastKeyTime : 0;
    lastKeyTime = now;

    const keyId = getKeyId(typedChar);
    recordKeyTiming(keyId, gap);
    flashKey(keyId);

    totalTyped++;

    const charEls = passageDisplay.querySelectorAll('.char');
    const expected = passage[currentIdx];

    if (typedChar === expected) {
      charEls[currentIdx].classList.remove('current', 'pending');
      charEls[currentIdx].classList.add('correct');
    } else {
      charEls[currentIdx].classList.remove('current', 'pending');
      charEls[currentIdx].classList.add('incorrect');
      totalErrors++;
    }

    currentIdx++;

    if (currentIdx < passage.length) {
      charEls[currentIdx].classList.remove('pending', 'correct', 'incorrect');
      charEls[currentIdx].classList.add('current');
    }

    // Accuracy
    const acc = totalTyped > 0 ? Math.round(((totalTyped - totalErrors) / totalTyped) * 100) : 100;
    if (acc !== displayedAcc) {
      displayedAcc = acc;
      statAcc.textContent = acc;
    }

    // Progress
    const pct = Math.round((currentIdx / passage.length) * 100);
    statProg.textContent = pct;
    progressFill.style.width = pct + '%';
    progressBar.setAttribute('aria-valuenow', pct);

    // Update heatmap live
    updateKeyHeatmap();

    // Completion
    if (currentIdx >= passage.length) {
      finishRace();
    }
  });

  // ─── KEY ID MAPPING ─────────────────────────────────────────────────────────
  function getKeyId(ch) {
    if (ch === ' ') return 'space';
    return ch.toLowerCase();
  }

  // ─── KEY TIMING ─────────────────────────────────────────────────────────────
  function recordKeyTiming(keyId, gapMs) {
    if (!keyId) return;
    if (!keyData[keyId]) keyData[keyId] = { totalMs: 0, count: 0 };
    if (gapMs > 0 && gapMs < 3000) {
      keyData[keyId].totalMs += gapMs;
      keyData[keyId].count++;
    }
  }

  // ─── KEY FLASH ──────────────────────────────────────────────────────────────
  function flashKey(keyId) {
    if (!keyId || !keyElMap[keyId]) return;
    const el = keyElMap[keyId];
    el.classList.add('pressed-anim');
    setTimeout(() => el.classList.remove('pressed-anim'), 80);
  }

  // ─── HEATMAP UPDATE ─────────────────────────────────────────────────────────
  function updateKeyHeatmap() {
    // Find the slowest avg among all tracked keys
    let maxAvg = 0;
    let minAvg = Infinity;
    const avgs = {};
    Object.entries(keyData).forEach(([id, d]) => {
      if (d.count > 0) {
        const avg = d.totalMs / d.count;
        avgs[id] = avg;
        if (avg > maxAvg) maxAvg = avg;
        if (avg < minAvg) minAvg = avg;
      }
    });

    const range = maxAvg - minAvg || 1;

    Object.entries(avgs).forEach(([id, avg]) => {
      const el = keyElMap[id];
      if (!el) return;
      const t = (avg - minAvg) / range; // 0 = fast (blue-cold), 1 = slow (red-hot)

      // Color: cold (#1a3a4a) → neutral (#2a4a2a) → warm (#8a6a0a) → hot (#8a1a0a)
      const r = Math.round(lerp(0x1a, 0x8a, t));
      const g = Math.round(lerp(0x3a, 0x1a, t));
      const b = Math.round(lerp(0x4a, 0x0a, t));

      el.classList.add('has-data');
      el.style.setProperty('--heat', t.toFixed(3));
      el.style.background = `rgb(${r},${g},${b})`;
      el.style.color = t > 0.5 ? '#f0ece0' : '#aaa';
      el.style.borderColor = `rgba(${r+40},${g+20},${b+20},0.7)`;

      // heat bar
      const hb = el.querySelector('.heat-bar');
      if (hb) {
        hb.style.background = `rgb(${r},${g},${b})`;
        hb.style.height = Math.round(2 + t * 4) + 'px';
        hb.style.opacity = 0.7 + t * 0.3;
      }

      // timing tooltip
      const kt = el.querySelector('.key-time');
      if (kt) kt.textContent = avg.toFixed(0) + 'ms';
    });
  }

  function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }

  // ─── FINISH RACE ─────────────────────────────────────────────────────────────
  function finishRace() {
    isFinished = true;
    if (timerRaf) cancelAnimationFrame(timerRaf);
    typingInput.disabled = true;
    typingInput.placeholder = '— race complete —';

    const elapsed = (performance.now() - startTime) / 1000;
    const words = passage.trim().split(/\s+/).length;
    const wpm = Math.round((words / elapsed) * 60);
    const acc = totalTyped > 0 ? Math.round(((totalTyped - totalErrors) / totalTyped) * 100) : 100;

    // Animate result numbers
    statWpm.textContent = wpm;
    statAcc.textContent = acc;
    statTime.textContent = elapsed.toFixed(1);
    statProg.textContent = '100';
    progressFill.style.width = '100%';

    // Show result panel
    resultPanel.classList.add('visible');
    animateNumber(resultWpm, 0, wpm, 800);
    resultAcc.textContent = acc;
    resultTime.textContent = elapsed.toFixed(2);
    resultErrors.textContent = totalErrors;
    resultChars.textContent = totalTyped;

    // Best score
    const prev = loadBest();
    if (!prev || wpm > prev.wpm) {
      saveBest({ wpm, acc, time: elapsed.toFixed(2) });
      bestWrap.innerHTML = `<span style="color:var(--ink)">✦ NEW BEST: ${wpm} WPM</span>`;
    } else {
      bestWrap.innerHTML = `Best: <span>${prev.wpm} WPM</span> · This run: <span>${wpm} WPM</span>`;
    }

    // Completion burst
    spawnBurst();
    updateKeyHeatmap();
  }

  // ─── ANIMATE NUMBER ──────────────────────────────────────────────────────────
  function animateNumber(el, from, to, duration) {
    const start = performance.now();
    function frame(now) {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      el.textContent = Math.round(from + (to - from) * ease);
      if (t < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  // ─── PARTICLE BURST ──────────────────────────────────────────────────────────
  const particles = [];

  function spawnBurst() {
    burstCanvas.width = window.innerWidth;
    burstCanvas.height = window.innerHeight;
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    for (let i = 0; i < 60; i++) {
      const angle = (Math.random() * Math.PI * 2);
      const speed = 2 + Math.random() * 6;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2,
        life: 1,
        decay: 0.015 + Math.random() * 0.02,
        size: 2 + Math.random() * 4,
        char: '·×+■'.split('')[Math.floor(Math.random() * 4)]
      });
    }
    burstLoop();
  }

  function burstLoop() {
    bctx.clearRect(0, 0, burstCanvas.width, burstCanvas.height);
    let alive = false;
    particles.forEach(p => {
      if (p.life <= 0) return;
      alive = true;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.15;
      p.life -= p.decay;
      bctx.globalAlpha = Math.max(0, p.life);
      bctx.fillStyle = '#f0ece0';
      bctx.font = `${p.size * 3}px 'Share Tech Mono', monospace`;
      bctx.fillText(p.char, p.x, p.y);
    });
    bctx.globalAlpha = 1;
    if (alive) requestAnimationFrame(burstLoop);
    else { bctx.clearRect(0, 0, burstCanvas.width, burstCanvas.height); particles.length = 0; }
  }

  // ─── LOCAL STORAGE ───────────────────────────────────────────────────────────
  function loadBest() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  }

  function saveBest(data) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch {}
  }

  // ─── PRESET BUTTONS ──────────────────────────────────────────────────────────
  presetBar.addEventListener('click', (e) => {
    const btn = e.target.closest('.preset-btn');
    if (!btn) return;
    presetBar.querySelectorAll('.preset-btn').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-pressed', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-pressed', 'true');

    const p = btn.dataset.preset;
    if (p === 'custom') {
      customWrap.classList.add('visible');
      return;
    }
    customWrap.classList.remove('visible');
    activePreset = parseInt(p, 10);
    initRace(PRESETS[activePreset]);
    typingInput.focus();
  });

  useCustomBtn.addEventListener('click', () => {
    const text = customText.value.trim();
    if (!text) return;
    initRace(text);
    typingInput.focus();
  });

  customText.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      useCustomBtn.click();
    }
  });

  // ─── RESET ────────────────────────────────────────────────────────────────────
  resetBtn.addEventListener('click', () => {
    const active = presetBar.querySelector('.preset-btn.active');
    if (active && active.dataset.preset !== 'custom') {
      initRace(PRESETS[parseInt(active.dataset.preset, 10)]);
    } else {
      const text = customText.value.trim();
      initRace(text || PRESETS[0]);
    }
    typingInput.focus();
  });

  // keyboard shortcut: Escape = reset
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { resetBtn.click(); }
  });

  // ─── INIT ─────────────────────────────────────────────────────────────────────
  initRace(PRESETS[0]);
  typingInput.focus();

})();
</script>
</body>
</html>
